#cloud-config
#
# Hetzner Cloud user-data for joinfs-teamspeak-docker-stack
#
# PREREQUISITE: Select "Docker CE" from the Hetzner Apps tab when creating the
# server — Docker and Docker Compose are pre-installed.
#
# Before deploying, replace these CHANGE_ME_* values below:
#   DB_ROOT_PASSWORD / TS3_SERVERADMIN_PASSWORD        →  openssl rand -base64 18
#   CHANGE_ME_CADDY_DOMAIN                              →  a real domain name you control, with
#                                                          a DNS A/AAAA record already pointing at
#                                                          this server's public IP. Caddy uses it
#                                                          to request a Let's Encrypt certificate,
#                                                          which requires ports 80+443 reachable
#                                                          from the internet.
#   CHANGE_ME_DOCKERHUB_LOGIN_USERNAME / _TOKEN         →  your OWN Docker Hub account +
#                                                          a read-only PAT (hub.docker.com →
#                                                          Account Settings → Security). This
#                                                          is only used to raise Docker Hub's
#                                                          anonymous pull-rate limit — it does
#                                                          NOT need to match DOCKERHUB_USERNAME
#                                                          below, which selects whose images to pull.
#
# Optional, not CHANGE_ME (safe to leave as shipped):
#   TS3_CONFIG                                          →  declarative TS3 server + channel setup,
#                                                          commented out below. See .env.example /
#                                                          README "Server and channel provisioning".
#   TSAPI_EXPOSE_WRITE_ENDPOINTS                        →  false by default (tsapi's PUT/POST routes
#                                                          are not publicly reachable). See README
#                                                          "Security: tsapi's public surface".
#
# The joinfs.service systemd unit below runs on every boot and on every manual
# `systemctl restart joinfs.service`:
#   1. Pulls the latest images from Docker Hub
#   2. Recreates containers with those images
# It intentionally does NOT delete Docker volumes, so the database, TeamSpeak
# channels/permissions, and JoinFS state all persist across restarts and reboots.

write_files:

  - path: /opt/joinfs/.env
    permissions: '0600'
    owner: root:root
    content: |
      DB_ROOT_PASSWORD=CHANGE_ME_DB_ROOT_PASSWORD
      TS3_SERVERADMIN_PASSWORD=CHANGE_ME_TS3_SERVERADMIN_PASSWORD
      # Optional: declarative TS3 server + channel setup, single-line JSON,
      # single-quoted. See .env.example / README "Server and channel provisioning"
      # for the full field reference and an example. Leave unset for no channels
      # and default TS3 server settings.
      # TS3_CONFIG='{"channels":[{"name":"Lounge","type":"permanent"}]}'
      JOINFS_HUB_NAME=My Hub Name
      JOINFS_HUB_DOMAIN=PLACEHOLDER
      CADDY_DOMAIN=CHANGE_ME_CADDY_DOMAIN
      # Whether tsapi's PUT/POST routes are reachable from the public internet via
      # Caddy. Default false (closed) — see README "Security: tsapi's public surface".
      TSAPI_EXPOSE_WRITE_ENDPOINTS=false
      DOCKERHUB_USERNAME=joeherwig
      FLASK_DEBUG=0

  - path: /opt/joinfs/Caddyfile
    permissions: '0644'
    owner: root:root
    content: |
      {$CADDY_DOMAIN} {
      	# JoinFS live aircraft WebSocket feed, exposed at /ws/ and proxied to the
      	# JoinFS hub's websocket listener at its own root path.
      	handle_path /ws/* {
      		reverse_proxy joinfs:8765
      	}

      	# Read-only tsapi routes are public by default.
      	@apiRead {
      		method GET
      		path /users* /channels*
      	}
      	handle @apiRead {
      		reverse_proxy tsapi:8081
      	}

      	# State-changing tsapi routes are closed to the public internet by default
      	# (no auth exists on them, and JoinFS calls /usertochannel over the internal
      	# Docker network directly, not through Caddy). Set TSAPI_EXPOSE_WRITE_ENDPOINTS=true
      	# in .env (and restart caddy) to expose them publicly anyway.
      	@apiWrite {
      		method PUT POST
      		path /usertochannel* /channel* /move*
      		expression `"{$TSAPI_EXPOSE_WRITE_ENDPOINTS}" == "true"`
      	}
      	handle @apiWrite {
      		reverse_proxy tsapi:8081
      	}

      	handle {
      		respond "Not Found" 404
      	}
      }

  - path: /opt/joinfs/query_ip_allowlist.txt
    permissions: '0644'
    owner: root:root
    content: |
      127.0.0.1
      ::1
      172.0.0.0/8
      10.0.0.0/8

  - path: /opt/joinfs/ts3init.py
    permissions: '0644'
    owner: root:root
    content: |
      #!/usr/bin/env python3
      import json, os, socket, sys, time

      HOST = 'teamspeak'
      PORT = 10011
      ADMIN_PASS = os.environ['TS3_SERVERADMIN_PASSWORD']

      BOOL_PERMS = [
          'b_virtualserver_client_list',
          'b_virtualserver_channel_list',
          'b_client_move_others',
          'b_channel_create_permanent',
          'b_channel_create_semi_permanent',
          'b_channel_create_temporary',
          'b_channel_modify_make_permanent',
          'b_channel_modify_make_temporary',
      ]
      INT_PERMS = [
          ('i_client_move_power', 100),
          ('i_channel_create_child_modify_power', 75),
          ('i_channel_modify_power', 75),
      ]
      CHANNEL_TYPE_FLAGS = {
          'permanent': {'channel_flag_permanent': '1'},
          'semi_permanent': {'channel_flag_semi_permanent': '1'},
          'temporary': {},
      }
      CHAT_PERMS = ['b_client_server_textmessage_send', 'b_client_channel_textmessage_send']

      def ts_escape(s):
          return s.replace('\\', '\\\\').replace(' ', '\\s').replace('|', '\\p').replace('/', '\\/')

      def recv_until_error(sock, timeout=5):
          sock.settimeout(timeout)
          buf = b''
          try:
              while True:
                  chunk = sock.recv(4096)
                  if not chunk:
                      break
                  buf += chunk
                  if any(l.startswith('error id=') for l in buf.decode(errors='ignore').splitlines()):
                      break
          except socket.timeout:
              pass
          return buf.decode(errors='ignore')

      def send_cmd(sock, text):
          sock.sendall((text + '\n').encode())
          return recv_until_error(sock)

      def parse_ts(raw):
          items = []
          for part in raw.split('|'):
              obj = {}
              for token in part.split():
                  if '=' in token:
                      k, v = token.split('=', 1)
                      obj[k] = v.replace('\\s', ' ').replace('\\p', '|')
              if obj:
                  items.append(obj)
          return items

      def open_session(retries=40, delay=5):
          escaped_pass = ts_escape(ADMIN_PASS)
          for attempt in range(1, retries + 1):
              sock = None
              try:
                  print(f"Attempt {attempt}/{retries}: connecting to {HOST}:{PORT}...", flush=True)
                  sock = socket.create_connection((HOST, PORT), timeout=5)
                  banner = recv_until_error(sock, timeout=3)
                  if not banner.strip():
                      print("  No banner received (TS3 initializing), waiting 20s...", flush=True)
                      sock.close()
                      time.sleep(20)
                      continue
                  resp = send_cmd(sock, f'login serveradmin {escaped_pass}')
                  if 'error id=0' not in resp:
                      print(f"  Login failed: {resp.strip()}", flush=True)
                      sock.close()
                      time.sleep(delay)
                      continue
                  resp = send_cmd(sock, 'use sid=1')
                  if 'error id=0' not in resp:
                      print(f"  use sid=1 failed: {resp.strip()}", flush=True)
                      sock.close()
                      time.sleep(delay)
                      continue
                  print("  Connected and logged in.", flush=True)
                  return sock
              except OSError as exc:
                  print(f"  Connection error: {exc}", flush=True)
                  if sock:
                      sock.close()
                  time.sleep(delay)
          sys.exit(f"ERROR: Could not establish a working TS3 session after {retries} attempts.")

      def load_ts3_config():
          raw = os.environ.get('TS3_CONFIG', '').strip()
          if not raw:
              return {}
          try:
              return json.loads(raw)
          except json.JSONDecodeError as exc:
              sys.exit(f"ERROR: TS3_CONFIG is not valid JSON: {exc}")

      def apply_server_settings(sock, server_cfg):
          parts = []
          if 'name' in server_cfg:
              parts.append(f"virtualserver_name={ts_escape(server_cfg['name'])}")
          if 'password' in server_cfg:
              parts.append(f"virtualserver_password={ts_escape(server_cfg['password'])}")
          if 'welcome_message' in server_cfg:
              msg = server_cfg['welcome_message']
              encoded = msg.encode('utf-8')
              if len(encoded) > 1024:
                  encoded = encoded[:1024]
                  while encoded and (encoded[-1] & 0xC0) == 0x80:
                      encoded = encoded[:-1]
                  msg = encoded.decode('utf-8', errors='ignore')
                  print("  WARN virtualserver_welcomemessage truncated to 1024 bytes", flush=True)
              parts.append(f"virtualserver_welcomemessage={ts_escape(msg)}")
          hostbanner = server_cfg.get('hostbanner') or {}
          if 'url' in hostbanner:
              parts.append(f"virtualserver_hostbanner_url={ts_escape(hostbanner['url'])}")
          if 'gfx_url' in hostbanner:
              parts.append(f"virtualserver_hostbanner_gfx_url={ts_escape(hostbanner['gfx_url'])}")
          if hostbanner:
              parts.append(f"virtualserver_hostbanner_mode={int(hostbanner.get('mode', 0))}")
          if not parts:
              print("No server settings in TS3_CONFIG, skipping serveredit.", flush=True)
              return
          resp = send_cmd(sock, 'serveredit ' + ' '.join(parts))
          ok = 'error id=0' in resp
          print(f"  {'OK  ' if ok else 'WARN'} serveredit ({len(parts)} field(s))", flush=True)
          if not ok:
              print(f"    response: {resp.strip()}", flush=True)

      def apply_chat_permission(sock, server_cfg, groups):
          if 'allow_client_chat' not in server_cfg:
              return
          allow = bool(server_cfg['allow_client_chat'])
          permvalue = '1' if allow else '0'
          normal_group = next((g for g in groups if g.get('name') == 'Normal' and g.get('type') == '1'), None)
          sgid = normal_group['sgid'] if normal_group else '8'
          label = normal_group['name'] if normal_group else 'sgid=8 (fallback)'
          print(f"Setting allow_client_chat={allow} on server group sgid={sgid} ({label})", flush=True)
          for perm in CHAT_PERMS:
              resp = send_cmd(sock, f'servergroupaddperm sgid={sgid} permsid={perm} permvalue={permvalue} permnegated=0 permskip=0')
              ok = 'error id=0' in resp or 'error id=2702' in resp
              print(f"  {'OK  ' if ok else 'WARN'} {perm}={permvalue}", flush=True)

      def sync_channels(sock, channels_cfg):
          if not channels_cfg:
              return
          existing = parse_ts(send_cmd(sock, 'channellist'))
          by_name = {c.get('channel_name'): c for c in existing}
          for entry in channels_cfg:
              name = entry.get('name')
              if not name:
                  print("  WARN channel entry missing 'name', skipping", flush=True)
                  continue
              chan_type = entry.get('type', 'permanent')
              type_flags = CHANNEL_TYPE_FLAGS.get(chan_type)
              if type_flags is None:
                  print(f"  WARN unknown channel type '{chan_type}' for '{name}', defaulting to permanent", flush=True)
                  type_flags = CHANNEL_TYPE_FLAGS['permanent']
              fields = [
                  f"channel_topic={ts_escape(entry.get('topic', ''))}",
                  f"channel_password={ts_escape(entry.get('password', ''))}",
                  f"channel_flag_permanent={type_flags.get('channel_flag_permanent', '0')}",
                  f"channel_flag_semi_permanent={type_flags.get('channel_flag_semi_permanent', '0')}",
              ]
              existing_channel = by_name.get(name)
              if existing_channel is None:
                  parts = [f"channel_name={ts_escape(name)}"] + fields
                  resp = send_cmd(sock, 'channelcreate ' + ' '.join(parts))
                  ok = 'error id=0' in resp
                  print(f"  {'CREATED' if ok else 'WARN   '} channel '{name}'", flush=True)
              else:
                  cid = existing_channel.get('cid')
                  parts = [f"cid={cid}"] + fields
                  resp = send_cmd(sock, 'channeledit ' + ' '.join(parts))
                  ok = 'error id=0' in resp
                  print(f"  {'UPDATED' if ok else 'WARN   '} channel '{name}' (cid={cid})", flush=True)
              if not ok:
                  print(f"    response: {resp.strip()}", flush=True)

      def main():
          config = load_ts3_config()
          server_cfg = config.get('server') or {}
          channels_cfg = config.get('channels') or []
          sock = open_session()
          groups = parse_ts(send_cmd(sock, 'servergrouplist'))
          admin_group = next(
              (g for g in groups if g.get('name') == 'Server Admin' and g.get('type') == '1'),
              None,
          )
          sgid = admin_group['sgid'] if admin_group else '6'
          label = admin_group['name'] if admin_group else 'sgid=6 (fallback)'
          print(f"Granting permissions to server group sgid={sgid} ({label})", flush=True)
          for perm in BOOL_PERMS:
              resp = send_cmd(sock, f'servergroupaddperm sgid={sgid} permsid={perm} permvalue=1 permnegated=0 permskip=0')
              ok = 'error id=0' in resp or 'error id=2702' in resp
              print(f"  {'OK  ' if ok else 'WARN'} {perm}", flush=True)
          for perm, value in INT_PERMS:
              resp = send_cmd(sock, f'servergroupaddperm sgid={sgid} permsid={perm} permvalue={value} permnegated=0 permskip=0')
              ok = 'error id=0' in resp or 'error id=2702' in resp
              print(f"  {'OK  ' if ok else 'WARN'} {perm}={value}", flush=True)
          apply_server_settings(sock, server_cfg)
          apply_chat_permission(sock, server_cfg, groups)
          sync_channels(sock, channels_cfg)
          send_cmd(sock, 'quit')
          sock.close()
          print("TS3 bootstrap complete.", flush=True)

      if __name__ == '__main__':
          main()

  - path: /opt/joinfs/compose.yaml
    permissions: '0644'
    owner: root:root
    content: |
      services:
        db:
          image: mariadb
          restart: always
          environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: teamspeak
          volumes:
            - db_data:/var/lib/mysql

        teamspeak:
          image: teamspeak
          restart: always
          depends_on:
            - db
          volumes:
            - /opt/joinfs/query_ip_allowlist.txt:/var/ts3server/query_ip_allowlist.txt
          ports:
            - 9987:9987/udp
            - 10011:10011
            - 30033:30033
          environment:
            TS3SERVER_DB_PLUGIN: ts3db_mariadb
            TS3SERVER_DB_SQLCREATEPATH: create_mariadb
            TS3SERVER_DB_HOST: db
            TS3SERVER_DB_USER: root
            TS3SERVER_DB_PASSWORD: ${DB_ROOT_PASSWORD}
            TS3SERVER_DB_NAME: teamspeak
            TS3SERVER_DB_WAITUNTILREADY: 30
            TS3SERVER_LICENSE: accept
            TS3SERVER_SERVERADMIN_PASSWORD: ${TS3_SERVERADMIN_PASSWORD}

        ts3init:
          image: python:3.12-alpine
          restart: "no"
          depends_on:
            teamspeak:
              condition: service_started
          environment:
            TS3_SERVERADMIN_PASSWORD: ${TS3_SERVERADMIN_PASSWORD}
          # TS3_CONFIG is delivered via env_file, not environment: above, because
          # it's a JSON blob — interpolating it as ${TS3_CONFIG} would splice raw
          # JSON text into this YAML document and collide with YAML flow-mapping
          # syntax. env_file reads .env's KEY=VALUE lines directly instead.
          env_file:
            - .env
          volumes:
            - /opt/joinfs/ts3init.py:/ts3init.py:ro
          command: python3 /ts3init.py

        tsapi:
          image: joeherwig/joinfs-tsapi:latest
          restart: always
          depends_on:
            teamspeak:
              condition: service_started
            ts3init:
              condition: service_completed_successfully
          environment:
            TS3_QUERY_HOST: teamspeak
            TS3_QUERY_PORT: "10011"
            TS3_QUERY_USER: serveradmin
            TS3_QUERY_PASSWORD: ${TS3_SERVERADMIN_PASSWORD}
            FLASK_DEBUG: ${FLASK_DEBUG:-0}

        joinfs:
          image: joeherwig/joinfs-console:latest

          container_name: joinfs
          restart: unless-stopped
          depends_on:
            - teamspeak
            - tsapi
          command:
            - --hub
            - --hubdomain
            - "${JOINFS_HUB_DOMAIN}"
            - --nosim
            - --hubname
            - "${JOINFS_HUB_NAME}"
            - --hubport
            - "6112"
            - --background
            - --nogui
            - --whazzup
            - --websocket
            - --websocketport
            - "8765"
            - --comswebhookuri
            - "http://tsapi:8081/usertochannel"
            - --comswebhookmethod
            - PUT
            - --websocketlog
          volumes:
            - joinfs_data:/JoinFS-CONSOLE/JoinFS-CONSOLE
          ports:
            - "6112:6112/udp"

        caddy:
          image: caddy:2
          restart: always
          depends_on:
            - tsapi
            - joinfs
          ports:
            - "80:80"
            - "443:443"
          environment:
            CADDY_DOMAIN: ${CADDY_DOMAIN}
            TSAPI_EXPOSE_WRITE_ENDPOINTS: ${TSAPI_EXPOSE_WRITE_ENDPOINTS:-false}
          volumes:
            - /opt/joinfs/Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config

      volumes:
        db_data:
        joinfs_data:
        caddy_data:
        caddy_config:

  - path: /etc/systemd/system/joinfs.service
    permissions: '0644'
    owner: root:root
    content: |
      [Unit]
      Description=JoinFS Docker Compose Stack
      After=docker.service network-online.target
      Requires=docker.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      WorkingDirectory=/opt/joinfs

      # '-' prefix means failure is non-fatal (nothing to remove on first boot).
      # Note: no `--volumes` here — this intentionally preserves the DB, TeamSpeak
      # channels/permissions, and JoinFS state across every restart/reboot.
      ExecStartPre=-/usr/bin/docker compose --env-file .env down --remove-orphans

      # Pull latest images so every boot/restart uses fresh code from Docker Hub
      ExecStartPre=/usr/bin/docker compose --env-file .env pull

      ExecStart=/usr/bin/docker compose --env-file .env up -d

      ExecStop=/usr/bin/docker compose --env-file .env down

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Resolve the server's public IP and write it into .env
  - |
    PUBLIC_IP=$(curl -sf http://169.254.169.254/hetzner/v1/metadata/public-ipv4 \
                || curl -sf https://api.ipify.org)
    sed -i "s/JOINFS_HUB_DOMAIN=PLACEHOLDER/JOINFS_HUB_DOMAIN=${PUBLIC_IP}/" /opt/joinfs/.env

  # Authenticate with Docker Hub (credentials persist in /root/.docker/config.json
  # for future reboots) to raise the anonymous pull-rate limit. Replace both values
  # with your own Docker Hub account and a read-only PAT.
  - echo "CHANGE_ME_DOCKERHUB_TOKEN" | docker login --username "CHANGE_ME_DOCKERHUB_LOGIN_USERNAME" --password-stdin

  # Register the service (runs on every future reboot) and start it now
  - systemctl daemon-reload
  - systemctl enable joinfs.service
  - systemctl start joinfs.service
